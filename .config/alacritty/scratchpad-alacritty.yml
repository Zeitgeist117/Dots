import:
  - /home/nightwing/.config/alacritty/dracula.yml

window:
  opacity: 0.6
  dimensions:
    columns: 100
    lines: 30

font:
  normal:
    family: Cartograph CF 
    style: regular
  bold:
    family: Fira Code Nerd Font
    style: bold
  italic:
    family: Fira Code Nerd Font
    style: italic
  bold_italic:
    family: Fira Code Nerd Font
    style: Bold Italic

  size: 15

key_bindings:
  - { key: C, mods: Alt, action: Copy }
  - { key: V, mods: Alt, action: Paste }
